octopus:
  image:
      repository: #Need to update this with the location of the container that was built using the Dockerfile
      tag: latest
  acceptEula: Y
  username: octoadmin
  password: octopassword
  enableDockerInDocker: false
  # Update with correct connection string
  databaseConnectionString: "Server=SqlServerDev;Database=OpenShiftOcto;Integrated Security=False; User Id=sa; Password=;"
  extraEnv:
    - name: OTEL_DOTNET_AUTO_LOG_DIRECTORY
      value: /tmp/otel/logs
    - name: OTEL_DOTNET_AUTO_HOME
      value: /tmp/otel
    - name: DOTNET_BUNDLE_EXTRACT_BASE_DIR
      value: /tmp/dotnet-bundle
    - name: TMPDIR
      value: /tmp
    - name: XDG_CACHE_HOME
      value: /home/octopus/.local/cache
    - name: XDG_DATA_HOME
      value: /home/octopus/.local/share
    - name: OTEL_DOTNET_AUTO_ENABLED
      value: "false"
    - name: CORECLR_ENABLE_PROFILING
      value: "0"
    - name: CORECLR_PROFILER
      value: ""
    - name: CORECLR_PROFILER_PATH
      value: ""
    - name: DOTNET_STARTUP_HOOKS
      value: ""

  extraVolumes:
    tmp:
      type: emptyDir
      mountPath: /tmp
      sizeLimit: "1Gi"
      medium: ""
    homeoctopus:
      type: emptyDir
      mountPath: /home/octopus
      sizeLimit: "100Mi"
      medium: ""
    etcoctopus:
      type: emptyDir
      mountPath: /etc/octopus
      sizeLimit: "10Mi"
      medium: ""
    octopuslogs:
      type: emptyDir
      mountPath: /Octopus/Octopus/Logs
      sizeLimit: "500Mi"
    octopusdiagnostics:
      type: emptyDir
      mountPath: /Octopus/.diagnostics
      sizeLimit: "100Mi"

  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    runAsNonRoot: true
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop: 
        - "ALL"
    

  serverConfigurationDirectory: /home/octopus/.local

mssql:
  enabled: false